services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commerce}
      POSTGRES_USER: ${POSTGRES_USER:-commerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commerce}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://commerce:commerce@db:5432/commerce}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-mock}
      MODEL_NAME: ${MODEL_NAME:-mock-commerce-agent}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.openai.com/v1}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
